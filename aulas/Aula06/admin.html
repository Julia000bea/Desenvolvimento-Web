<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - CartoonGram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container justify-content-between">
      <a class="navbar-brand logo-fonte fs-3 text-decoration-none" href="../index.html">CartoonGram</a>
      <div class="d-flex align-items-center gap-2">
        <span class="badge-pink px-3 py-2"><i class="bi bi-shield-fill-check me-1"></i>Admin</span>
        <a href="../index.html"     class="nav-icon-btn" title="Início"><i class="bi bi-house-door"></i></a>
        <button id="btnLogout" class="nav-icon-btn danger" title="Sair"><i class="bi bi-box-arrow-right"></i></button>
      </div>
    </div>
  </nav>

  <main class="container py-4">

    <!-- HEADER -->
    <div class="d-flex align-items-center gap-3 mb-4">
      <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#f06292);display:flex;align-items:center;justify-content:center;">
        <i class="bi bi-shield-fill-check text-white fs-5"></i>
      </div>
      <div>
        <h4 class="fw-bold mb-0">Painel Administrativo</h4>
        <p class="text-muted small mb-0">Gerenciamento de usuários</p>
      </div>
    </div>

    <!-- MENSAGEM DE ACESSO NEGADO (escondida por padrão) -->
    <div id="acessoNegado" class="d-none">
      <div class="settings-card text-center py-5">
        <i class="bi bi-shield-lock-fill text-danger" style="font-size:3rem"></i>
        <h5 class="fw-bold mt-3">Acesso Negado</h5>
        <p class="text-muted">Apenas administradores podem acessar esta página.</p>
        <a href="../index.html" class="btn-pink px-4">Voltar ao Feed</a>
      </div>
    </div>

    <!-- CONTEÚDO ADMIN -->
    <div id="conteudoAdmin" class="d-none">

      <!-- STATS -->
      <div class="row g-3 mb-4" id="statsRow">
        <div class="col-6 col-md-3">
          <div class="card p-3 text-center">
            <div class="fw-bold fs-3 mb-0" id="totalUsuarios">—</div>
            <div class="small text-muted">Total usuários</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card p-3 text-center">
            <div class="fw-bold fs-3 mb-0" id="totalAdmins">—</div>
            <div class="small text-muted">Admins</div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="card p-3 text-center">
            <div class="fw-bold fs-3 mb-0" id="totalComuns">—</div>
            <div class="small text-muted">Usuários comuns</div>
          </div>
        </div>
      </div>

      <!-- CRIAR USUÁRIO -->
      <div class="settings-card mb-4">
        <h6 class="fw-bold mb-3"><i class="bi bi-person-plus me-2" style="color:var(--pink)"></i>Criar Novo Usuário</h6>
        <div id="msgCriar" class="d-none small mb-2 p-2 rounded-3"></div>
        <form id="formCriar">
          <div class="row g-2">
            <div class="col-12 col-md-4">
              <input type="text"     id="novoUsername" class="form-control" placeholder="Username" required>
            </div>
            <div class="col-12 col-md-4">
              <input type="email"    id="novoEmail"    class="form-control" placeholder="E-mail" required>
            </div>
            <div class="col-12 col-md-4">
              <input type="password" id="novaSenha"    class="form-control" placeholder="Senha (mín. 6)" required>
            </div>
            <div class="col-12 col-md-3">
              <select id="novoRole" class="form-control">
                <option value="user">Usuário comum</option>
                <option value="admin">Administrador</option>
              </select>
            </div>
            <div class="col-12 col-md-3">
              <button type="submit" class="btn-pink w-100 py-2">Criar</button>
            </div>
          </div>
        </form>
      </div>

      <!-- LISTA DE USUÁRIOS -->
      <div class="settings-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="fw-bold mb-0"><i class="bi bi-people me-2" style="color:var(--pink)"></i>Usuários Cadastrados</h6>
          <button class="action-btn" onclick="carregarUsuarios()"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
        <div id="msgRemover" class="d-none small mb-2 p-2 rounded-3"></div>
        <div id="listaUsuarios"><p class="text-muted small">Carregando...</p></div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
  <script>
    async function init() {
      // Verifica sessão no servidor
      const res  = await fetch('/auth/me');
      const data = await res.json();

      if (!res.ok) {
        window.location.href = 'login.html';
        return;
      }

      if (data.usuario.role !== 'admin') {
        document.getElementById('acessoNegado').classList.remove('d-none');
        return;
      }

      document.getElementById('conteudoAdmin').classList.remove('d-none');
      carregarUsuarios();
    }

    async function carregarUsuarios() {
      const res  = await fetch('/usuarios');
      const data = await res.json();
      const lista = data.usuarios || [];

      // Stats
      document.getElementById('totalUsuarios').textContent = lista.length;
      document.getElementById('totalAdmins').textContent   = lista.filter(u => u.role === 'admin').length;
      document.getElementById('totalComuns').textContent   = lista.filter(u => u.role === 'user').length;

      // Tabela
      const eu = JSON.parse(sessionStorage.getItem('usuario') || '{}');
      const html = lista.map(u => `
        <div class="settings-item">
          <div class="d-flex align-items-center gap-3">
            <div style="width:38px;height:38px;border-radius:50%;background:${u.role==='admin'?'linear-gradient(135deg,var(--pink),#f06292)':'var(--surface2)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <i class="bi ${u.role==='admin'?'bi-shield-fill-check text-white':'bi-person text-muted'}"></i>
            </div>
            <div>
              <div class="fw-semibold">${u.username} ${u.id == eu.id ? '<span class="badge-pink ms-1">Você</span>' : ''}</div>
              <div class="small text-muted">${u.email}</div>
            </div>
          </div>
          <div class="d-flex align-items-center gap-2">
            <span class="badge-pink" style="${u.role==='admin'?'':'background:var(--surface2);color:var(--text-muted)'}">${u.role}</span>
            ${u.id != eu.id ? `<button class="action-btn text-danger" onclick="remover(${u.id}, '${u.username}')" title="Remover"><i class="bi bi-trash3"></i></button>` : ''}
          </div>
        </div>
      `).join('');

      document.getElementById('listaUsuarios').innerHTML = html || '<p class="text-muted small">Nenhum usuário encontrado.</p>';
    }

    async function remover(id, nome) {
      if (!confirm(`Remover o usuário "${nome}"?`)) return;
      const res  = await fetch(`/usuarios/${id}`, { method: 'DELETE' });
      const data = await res.json();
      const msg  = document.getElementById('msgRemover');
      msg.textContent = data.mensagem || data.erro;
      msg.className   = `small mb-2 p-2 rounded-3 ${res.ok ? 'alert alert-success' : 'alert alert-danger'}`;
      msg.classList.remove('d-none');
      if (res.ok) carregarUsuarios();
      setTimeout(() => msg.classList.add('d-none'), 3000);
    }

    document.getElementById('formCriar').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msgCriar');
      const res = await fetch('/usuarios', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('novoUsername').value.trim(),
          email:    document.getElementById('novoEmail').value.trim(),
          password: document.getElementById('novaSenha').value,
          role:     document.getElementById('novoRole').value
        })
      });
      const data = await res.json();
      msg.textContent = data.mensagem || data.erro;
      msg.className   = `small mb-2 p-2 rounded-3 ${res.ok ? 'alert alert-success' : 'alert alert-danger'}`;
      msg.classList.remove('d-none');
      if (res.ok) { e.target.reset(); carregarUsuarios(); }
      setTimeout(() => msg.classList.add('d-none'), 3000);
    });

    document.getElementById('btnLogout').addEventListener('click', async () => {
      await fetch('/auth/logout');
      sessionStorage.clear();
      window.location.href = 'login.html';
    });

    init();
  </script>
</body>
</html>
