  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const textoPost   = document.getElementById('textoPost');
    const btnPublicar = document.getElementById('btnPublicar');

    // Ativa/desativa botão
    textoPost.addEventListener('input', () => {
      btnPublicar.disabled = textoPost.value.trim() === '';
    });

    // Publicar post fake (frontend)
    btnPublicar.addEventListener('click', () => {
      const feed = document.getElementById('feed');

      const post = document.createElement('div');
      post.className = 'post-card mt-3 p-3 border rounded';
      post.innerText = textoPost.value;

      feed.prepend(post);

      textoPost.value = '';
      btnPublicar.disabled = true;
    });

    // Logout
    document.getElementById('btnLogout').addEventListener('click', async () => {
      await fetch('/auth/logout');
      sessionStorage.clear();
      window.location.href = 'pages/login.html';
    });

    // Verifica sessão
    async function verificarSessao() {
      try {
        const res = await fetch('/auth/me');

        if (!res.ok) throw new Error();

        const data = await res.json();
        const u = data.usuario;

        sessionStorage.setItem('usuario', JSON.stringify(u));

        if (u.role === 'admin') {
          document.getElementById('linkAdmin').classList.remove('d-none');
        }

      } catch {
        window.location.href = 'pages/login.html';
      }
    }

    verificarSessao();
  </script>
