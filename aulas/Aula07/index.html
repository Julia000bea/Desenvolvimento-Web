<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel de Controle</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #10b981;
      --red: #ef4444;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow-x: hidden;
    }

    /* Fundo animado */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 80%, rgba(6,182,212,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .badge {
      background: var(--accent);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      margin-left: auto;
      transition: background 0.3s;
      box-shadow: 0 0 0 0 var(--muted);
    }
    .status-dot.connected {
      background: var(--green);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
      50% { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
    }

    #status-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      transition: color 0.3s;
    }
    #status-label.connected { color: var(--green); }

    main {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      height: 100%;
    }

    /* COLUNA ESQUERDA: controles */
    .controls-panel {
      border-right: 1px solid var(--border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      overflow-y: auto;
    }

    .section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Cards de controle */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent); }

    .card label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 0.6rem;
      color: var(--text);
    }

    /* Botões de cor */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.5rem;
    }
    .color-btn {
      aspect-ratio: 1;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      position: relative;
    }
    .color-btn:hover { transform: scale(1.1); border-color: #fff3; }
    .color-btn.active { border-color: #fff; transform: scale(1.1); }

    /* Slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    input[type="range"] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .slider-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent2);
      min-width: 2.5rem;
      text-align: right;
    }

    /* Text input */
    .text-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 0.75rem;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--accent2); }

    /* Select */
    select.text-input {
      cursor: pointer;
    }

    /* Botões de ação */
    .btn {
      width: 100%;
      padding: 0.65rem 1rem;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #6d28d9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red);
    }
    .btn-danger:hover { background: var(--red); color: #fff; }

    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .btn-grid-mt { margin-top: 0.75rem; }

    /* Keydown tracker */
    #key-display {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent3);
      min-height: 2.2rem;
      transition: background 0.1s;
    }

    /* Mouse tracker */
    #mouse-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* COLUNA DIREITA: iframe + log */
    .right-panel {
      display: grid;
      grid-template-rows: 1fr 200px;
    }

    .iframe-wrapper {
      position: relative;
      overflow: hidden;
    }

    .iframe-label {
      position: absolute;
      top: 1rem; left: 1rem;
      z-index: 10;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    #visualization-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Log de eventos */
    .log-panel {
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .log-header {
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .log-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }
    .clear-btn:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    #event-log {
      height: calc(200px - 2.2rem);
      overflow-y: auto;
      padding: 0.5rem 1rem;
      display: flex;
      flex-direction: column-reverse;
      gap: 0.2rem;
    }
    #event-log::-webkit-scrollbar { width: 4px; }
    #event-log::-webkit-scrollbar-track { background: transparent; }
    #event-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-entry {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      display: flex;
      gap: 0.75rem;
      align-items: baseline;
      animation: slide-in 0.2s ease;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .log-time { color: var(--muted); min-width: 5rem; }
    .log-type { min-width: 5rem; }
    .log-type.sent    { color: var(--accent); }
    .log-type.recv    { color: var(--green); }
    .log-type.local   { color: var(--accent3); }
    .log-type.custom  { color: var(--accent2); }
    .log-msg { color: var(--text); opacity: 0.8; }

    footer {
      position: relative;
      z-index: 1;
      padding: 0.75rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .footer-info {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
    }
    #mouse-coords {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--accent2);
      margin-left: auto;
    }
  </style>
</head>
<body>

<header>
  <span class="badge">CTRL</span>
  <h1>Painel de Controle</h1>
  <span id="status-label">desconectado</span>
  <div class="status-dot" id="status-dot"></div>
</header>

<main>
  <!-- CONTROLES -->
  <aside class="controls-panel">

    <!-- Cor de fundo -->
    <div>
      <p class="section-title">Aparência</p>
      <div class="card">
        <label>Cor de Fundo</label>
        <div class="color-grid" id="color-grid">
          <div class="color-btn active" style="background:#1a1a2e" data-color="#1a1a2e"></div>
          <div class="color-btn" style="background:#1e3a5f" data-color="#1e3a5f"></div>
          <div class="color-btn" style="background:#2d1b69" data-color="#2d1b69"></div>
          <div class="color-btn" style="background:#1a3a2a" data-color="#1a3a2a"></div>
          <div class="color-btn" style="background:#3a1a1a" data-color="#3a1a1a"></div>
          <div class="color-btn" style="background:#0f2027" data-color="#0f2027"></div>
          <div class="color-btn" style="background:#2c3e50" data-color="#2c3e50"></div>
          <div class="color-btn" style="background:#1a0533" data-color="#1a0533"></div>
          <div class="color-btn" style="background:#0d2137" data-color="#0d2137"></div>
          <div class="color-btn" style="background:#1f0a0a" data-color="#1f0a0a"></div>
        </div>
      </div>
    </div>

    <!-- Tamanho do texto -->
    <div>
      <div class="card">
        <label>Tamanho do Texto (input/change)</label>
        <div class="slider-row">
          <input type="range" id="font-size" min="12" max="80" value="36">
          <span class="slider-val" id="font-size-val">36px</span>
        </div>
      </div>
    </div>

    <!-- Texto a exibir -->
    <div>
      <div class="card">
        <label>Texto para Exibir (keydown)</label>
        <input type="text" class="text-input" id="text-input" placeholder="Digite algo…" maxlength="80">
        <div id="key-display" style="margin-top:0.5rem">—</div>
      </div>
    </div>

    <!-- Animação -->
    <div>
      <div class="card">
        <label>Animação (click)</label>
        <select class="text-input" id="anim-select" title="Selecionar animação" aria-label="Selecionar animação">
          <option value="none">Nenhuma</option>
          <option value="pulse">Pulso</option>
          <option value="spin">Rotação</option>
          <option value="bounce">Salto</option>
          <option value="shake">Tremor</option>
          <option value="float">Flutuação</option>
        </select>
        <div class="btn-grid btn-grid-mt">
          <button class="btn btn-primary" id="btn-apply">▶ Aplicar</button>
          <button class="btn btn-secondary" id="btn-stop">■ Parar</button>
        </div>
      </div>
    </div>

    <!-- Hover / mouseover -->
    <div>
      <div class="card" id="hover-card"
           style="cursor:pointer; transition: background 0.2s;"
           onmouseenter="handleHoverEnter()"
           onmouseleave="handleHoverLeave()">
        <label>Zona mouseover / mouseenter</label>
        <p style="font-size:0.8rem; color:var(--muted);">Passe o mouse aqui para enviar evento de hover.</p>
      </div>
    </div>

    <!-- Evento customizado -->
    <div>
      <p class="section-title">Evento Customizado</p>
      <div class="card">
        <label>Disparar "modoEscuro"</label>
        <div class="btn-grid">
          <button class="btn btn-primary" id="btn-dark" onclick="dispararModoEscuro(true)">🌙 Escuro</button>
          <button class="btn btn-secondary" id="btn-light" onclick="dispararModoEscuro(false)">☀ Claro</button>
        </div>
      </div>
    </div>

    <!-- Reset -->
    <div>
      <button class="btn btn-danger" onclick="resetarTudo()">↺ Resetar Visualizador</button>
    </div>

  </aside>

  <!-- IFRAME + LOG -->
  <div class="right-panel">
    <div class="iframe-wrapper">
      <div class="iframe-label">painel-visualizacao.html — iframe</div>
      <iframe id="visualization-frame" src="view.html" title="Painel de Visualização"></iframe>
    </div>

    <div class="log-panel">
      <div class="log-header">
        <span class="log-title">▸ Event Log</span>
        <button class="clear-btn" onclick="limparLog()">limpar</button>
      </div>
      <div id="event-log"></div>
    </div>
  </div>
</main>

<footer>
  <span class="footer-info">Desenvolvimento para Web — Aula 07 — Eventos em JavaScript</span>
  <span id="mouse-coords">x: 0  y: 0</span>
</footer>

<script>
  const iframe = document.getElementById('visualization-frame');
  const statusDot = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');
  const logEl = document.getElementById('event-log');

  // ─── Utilitários ─────────────────────────────────────────────
  function timestamp() {
    return new Date().toLocaleTimeString('pt-BR', { hour12: false });
  }

  function log(type, msg) {
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="log-time">${timestamp()}</span>
                       <span class="log-type ${type}">[${type.toUpperCase()}]</span>
                       <span class="log-msg">${msg}</span>`;
    logEl.prepend(entry);
    if (logEl.children.length > 60) logEl.lastElementChild.remove();
  }

  function enviarMensagem(payload) {
    iframe.contentWindow.postMessage(payload, '*');
    log('sent', JSON.stringify(payload));
  }

  function limparLog() { logEl.innerHTML = ''; }

  // ─── Status de conexão ────────────────────────────────────────
  iframe.addEventListener('load', () => {
    statusDot.classList.add('connected');
    statusLabel.textContent = 'conectado';
    statusLabel.classList.add('connected');
    log('local', 'iframe carregado — conexão estabelecida');
  });

  // ─── Receber mensagens do iframe (bidirecional) ───────────────
  window.addEventListener('message', (event) => {
    log('recv', JSON.stringify(event.data));

    // Evento customizado disparado pelo iframe
    if (event.data?.tipo === 'CLIQUE_VISUALIZADOR') {
      const ev = new CustomEvent('feedbackVisual', {
        detail: { origem: 'iframe', dado: event.data.dado }
      });
      document.dispatchEvent(ev);
    }
  });

  document.addEventListener('feedbackVisual', (e) => {
    log('custom', `feedbackVisual → origem: ${e.detail.origem} | dado: ${e.detail.dado}`);
  });

  // ─── EVENTOS: Cor de fundo (click) ───────────────────────────
  document.getElementById('color-grid').addEventListener('click', (e) => {
    const btn = e.target.closest('.color-btn');
    if (!btn) return;
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cor = btn.dataset.color;
    log('local', `click → cor selecionada: ${cor}`);
    enviarMensagem({ tipo: 'COR_FUNDO', valor: cor });
  });

  // ─── EVENTOS: Tamanho do texto (input + change) ───────────────
  const fontSlider = document.getElementById('font-size');
  const fontVal = document.getElementById('font-size-val');

  fontSlider.addEventListener('input', (e) => {
    fontVal.textContent = e.target.value + 'px';
    log('local', `input → tamanho: ${e.target.value}px`);
    enviarMensagem({ tipo: 'TAMANHO_TEXTO', valor: parseInt(e.target.value) });
  });

  fontSlider.addEventListener('change', (e) => {
    log('local', `change → tamanho final: ${e.target.value}px`);
  });

  // ─── EVENTOS: Texto (keydown) ─────────────────────────────────
  const textInput = document.getElementById('text-input');
  const keyDisplay = document.getElementById('key-display');

  textInput.addEventListener('keydown', (e) => {
    keyDisplay.textContent = `↓ ${e.key} (code: ${e.code})`;
    keyDisplay.style.background = 'rgba(245,158,11,0.08)';
    setTimeout(() => keyDisplay.style.background = '', 200);
    log('local', `keydown → key: "${e.key}"`);
  });

  textInput.addEventListener('input', (e) => {
    enviarMensagem({ tipo: 'TEXTO', valor: e.target.value });
  });

  // ─── EVENTOS: Animação (click) ────────────────────────────────
  document.getElementById('btn-apply').addEventListener('click', () => {
    const anim = document.getElementById('anim-select').value;
    log('local', `click → animação: ${anim}`);
    enviarMensagem({ tipo: 'ANIMACAO', valor: anim });
  });

  document.getElementById('btn-stop').addEventListener('click', () => {
    log('local', 'click → parar animação');
    enviarMensagem({ tipo: 'ANIMACAO', valor: 'none' });
  });

  // ─── EVENTOS: Hover / mouseover / mouseenter ──────────────────
  function handleHoverEnter() {
    document.getElementById('hover-card').style.background = 'rgba(6,182,212,0.05)';
    log('local', 'mouseenter → hover na zona de controle');
    enviarMensagem({ tipo: 'HOVER', estado: 'enter' });
  }

  function handleHoverLeave() {
    document.getElementById('hover-card').style.background = '';
    log('local', 'mouseleave → saiu da zona de controle');
    enviarMensagem({ tipo: 'HOVER', estado: 'leave' });
  }

  // ─── EVENTO CUSTOMIZADO: modoEscuro ──────────────────────────
  function dispararModoEscuro(ativo) {
    const eventoCustom = new CustomEvent('modoEscuro', {
      detail: { ativo, origem: 'painel-controle' }
    });
    document.dispatchEvent(eventoCustom);
    log('custom', `CustomEvent "modoEscuro" disparado → ativo: ${ativo}`);
    enviarMensagem({ tipo: 'MODO_ESCURO', ativo });
  }

  document.addEventListener('modoEscuro', (e) => {
    log('custom', `ouvindo "modoEscuro" → detail: ${JSON.stringify(e.detail)}`);
  });

  // ─── EVENTOS: Reset (click) ───────────────────────────────────
  function resetarTudo() {
    log('local', 'click → reset enviado');
    enviarMensagem({ tipo: 'RESET' });
  }

  // ─── EVENTOS: Mouse global (mouseover/mousemove no footer) ────
  document.addEventListener('mousemove', (e) => {
    document.getElementById('mouse-coords').textContent = `x: ${e.clientX}  y: ${e.clientY}`;
  });
</script>
</body>
</html>
