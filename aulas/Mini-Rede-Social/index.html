<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CartoonGram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container justify-content-between">
      <a class="navbar-brand logo-fonte fs-3 text-decoration-none" href="index.html">CartoonGram</a>
      <div class="d-flex align-items-center gap-1">
        <a href="index.html"         class="nav-icon-btn active"  title="Início">      <i class="bi bi-house-door-fill"></i></a>
        <a href="pages/perfil.html"  class="nav-icon-btn"         title="Perfil">      <i class="bi bi-person-circle"></i></a>
        <a href="pages/configuracao.html" class="nav-icon-btn"    title="Configurações"><i class="bi bi-gear"></i></a>
        <a href="pages/login.html"   class="nav-icon-btn danger"  title="Sair">        <i class="bi bi-box-arrow-right"></i></a>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="container py-3">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-5">

        <!-- STORIES -->
        <div class="stories-row">
          <div class="story-item">
            <div class="story-ring"><img src="https://img.quizur.com/f/img6019625ad2d8a2.14565371.jpg" alt="Você"></div>
            <span class="story-name">Você</span>
          </div>
          <div class="story-item">
            <div class="story-ring"><img src="https://i.pravatar.cc/150?img=12" alt="Marcos"></div>
            <span class="story-name">Marcos</span>
          </div>
          <div class="story-item">
            <div class="story-ring"><img src="https://i.pravatar.cc/150?img=47" alt="Ana Clara"></div>
            <span class="story-name">Ana Clara</span>
          </div>
          <div class="story-item">
            <div class="story-ring"><img src="https://i.pravatar.cc/150?img=32" alt="Pedro"></div>
            <span class="story-name">Pedro</span>
          </div>
          <div class="story-item">
            <div class="story-ring"><img src="https://i.pravatar.cc/150?img=25" alt="Carla"></div>
            <span class="story-name">Carla</span>
          </div>
        </div>

        <!-- COMPOSER -->
        <div class="composer-card">
          <div class="d-flex gap-3 align-items-start">
            <img src="https://img.quizur.com/f/img6019625ad2d8a2.14565371.jpg" class="post-avatar-sm mt-1" alt="Você">
            <textarea id="textoPost" rows="2" placeholder="O que está acontecendo?"></textarea>
          </div>
          <div class="composer-divider"></div>
          <div class="d-flex align-items-center justify-content-between">
            <div class="d-flex gap-2">
              <button class="action-btn" title="Foto"><i class="bi bi-image" style="color:var(--pink)"></i></button>
              <button class="action-btn" title="Emoji"><i class="bi bi-emoji-smile" style="color:#f59e0b"></i></button>
            </div>
            <button id="btnPublicar" class="btn-pink">Publicar</button>
          </div>
        </div>

        <!-- FEED -->
        <div id="feed"></div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
