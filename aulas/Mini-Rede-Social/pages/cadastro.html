<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-primary-subtle">
    <div class="card p-4 shadow-sm border-0" style="width: 400px;">
        <h1 class="logo-fonte text-center mb-3 fs-1 text-primary">CartoonGram</h1>
        <p class="text-center text-muted small">Crie sua conta e divirta-se.</p>
        <form action="login.html">
            <input type="text" class="form-control mb-2" placeholder="Nome de utilizador" required>
            <input type="email" class="form-control mb-2" placeholder="E-mail" required>
            <input type="password" class="form-control mb-3" placeholder="Senha" required>
            <button class="btn btn-primary w-100 fw-bold">Registrar</button>
        </form>
        <p class="text-center mt-3 small">Já tem conta? <a href="login.html" class="text-decoration-none fw-bold">Login</a></p>
    </div>
</body>
</html>
