<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-body-tertiary">
    <div class="container mt-5">
        <div class="card p-4 border-0 shadow-sm mx-auto" style="max-width: 500px;">
            <h4 class="fw-bold">Configurações</h4>
            <hr>
            <div class="form-check form-switch mb-4">
                <input class="form-check-input" type="checkbox" id="darkSwitch">
                <label class="form-check-label fw-bold">Modo Noturno</label>
            </div>
            <form id="editForm">
                <label class="small fw-bold">Alterar Bio</label>
                <textarea class="form-control mb-3">Desenvolvedora | Técnica em Agro </textarea>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Salvar Alterações</button>
            </form>
            <a href="../index.html" class="d-block text-center mt-3 text-decoration-none text-muted small">Voltar</a>
        </div>
    </div>

    <script>
        const s = document.getElementById('darkSwitch');
        const html = document.documentElement;

        // 1. AO CARREGAR: Verifica se existe um tema salvo no "disco" do navegador
        const temaSalvo = localStorage.getItem('tema');
        if (temaSalvo === 'dark') {
            html.setAttribute('data-bs-theme', 'dark');
            s.checked = true; // Mantém o botão ligado
        }

        // 2. AO CLICAR: Muda o tema e salva a preferência
        s.addEventListener('change', () => {
            if (s.checked) {
                html.setAttribute('data-bs-theme', 'dark');
                localStorage.setItem('tema', 'dark'); // Salva "dark"
            } else {
                html.setAttribute('data-bs-theme', 'light');
                localStorage.setItem('tema', 'light'); // Salva "light"
            }
        });

        // Simulação de salvar bio
        document.getElementById('editForm').onsubmit = (e) => {
            e.preventDefault();
            alert('Configurações salvas com sucesso!');
        };
    </script>
</body>
</html>
