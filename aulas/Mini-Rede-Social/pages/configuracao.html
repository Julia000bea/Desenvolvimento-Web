<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configurações - CartoonGram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container justify-content-between">
      <a class="navbar-brand logo-fonte fs-3 text-decoration-none" href="../index.html">CartoonGram</a>
      <div class="d-flex align-items-center gap-1">
        <a href="../index.html"    class="nav-icon-btn" title="Início">  <i class="bi bi-house-door"></i></a>
        <a href="perfil.html"      class="nav-icon-btn" title="Perfil">  <i class="bi bi-person-circle"></i></a>
        <a href="configuracao.html" class="nav-icon-btn active" title="Configurações"><i class="bi bi-gear-fill"></i></a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="settings-card fade-in">

      <h5 class="fw-bold mb-1">Configurações</h5>
      <p class="text-muted small mb-4">Personalize sua experiência</p>

      <!-- APARÊNCIA -->
      <p class="fw-semibold small text-muted text-uppercase mb-2" style="letter-spacing:.06em">Aparência</p>
      <div class="settings-item">
        <div>
          <div class="fw-semibold">Modo Noturno</div>
          <div class="small text-muted">Ativar tema escuro</div>
        </div>
        <div class="form-check form-switch mb-0">
          <input class="form-check-input" type="checkbox" id="darkSwitch" role="switch">
        </div>
      </div>

      <!-- PERFIL -->
      <p class="fw-semibold small text-muted text-uppercase mt-4 mb-2" style="letter-spacing:.06em">Perfil</p>

      <form id="editForm">
        <div class="mb-3">
          <label class="small fw-semibold mb-1 d-block">Nome</label>
          <input type="text" class="form-control" value="Julia Beatriz">
        </div>
        <div class="mb-3">
          <label class="small fw-semibold mb-1 d-block">Bio</label>
          <textarea class="form-control" rows="3">Desenvolvedora | Técnica em Agro</textarea>
        </div>
        <button type="submit" class="btn-pink w-100 py-2">Salvar Alterações</button>
      </form>

      <!-- CONTA -->
      <p class="fw-semibold small text-muted text-uppercase mt-4 mb-2" style="letter-spacing:.06em">Conta</p>
      <div class="settings-item">
        <div>
          <div class="fw-semibold">Notificações</div>
          <div class="small text-muted">Receber notificações</div>
        </div>
        <div class="form-check form-switch mb-0">
          <input class="form-check-input" type="checkbox" role="switch" checked>
        </div>
      </div>
      <div class="settings-item">
        <div>
          <div class="fw-semibold text-danger">Sair da conta</div>
          <div class="small text-muted">Encerrar sessão</div>
        </div>
        <a href="login.html" class="text-danger text-decoration-none">
          <i class="bi bi-box-arrow-right fs-5"></i>
        </a>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
