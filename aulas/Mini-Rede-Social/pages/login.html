<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CartoonGram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card fade-in">

      <div class="text-center mb-4">
        <h1 class="logo-fonte fs-1 mb-1">CartoonGram</h1>
        <p class="text-muted small">Bem-vinda de volta! 👋</p>
      </div>

      <form onsubmit="event.preventDefault(); window.location.href='../index.html';">
        <div class="mb-3">
          <input type="email" class="form-control" placeholder="E-mail ou utilizador" required>
        </div>
        <div class="mb-3 position-relative">
          <input type="password" class="form-control" id="senhaInput" placeholder="Palavra-passe" required>
          <button type="button" class="btn p-0 position-absolute end-0 top-50 translate-middle-y me-3 border-0 bg-transparent text-muted"
            onclick="toggleSenha()" style="z-index:5">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
        <button type="submit" class="btn-pink w-100 py-2 mb-3">Entrar</button>
      </form>

      <div class="auth-divider">ou continue com</div>

      <div class="d-flex gap-2 justify-content-center mt-3">
        <button class="btn btn-outline-secondary rounded-pill px-4 py-2 small fw-semibold">
          <i class="bi bi-google me-2"></i>Google
        </button>
      </div>

      <p class="text-center mt-4 small text-muted">
        Não tens conta? <a href="cadastro.html" class="fw-bold text-decoration-none" style="color:var(--pink)">Registre-se</a>
      </p>
    </div>
  </div>

  <script>
    function toggleSenha() {
      const inp  = document.getElementById('senhaInput');
      const icon = document.getElementById('eyeIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        inp.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }
  </script>
  <script src="../js/script.js"></script>
</body>
</html>
