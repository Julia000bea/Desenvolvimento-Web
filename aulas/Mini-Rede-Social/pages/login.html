<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CartoonGram</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-light">
    <div class="card p-4 shadow-sm border-0" style="width: 350px;">
        <h1 class="logo-fonte text-center mb-4 fs-1">CartoonGram</h1>
        <form onsubmit="event.preventDefault(); window.location.href='../index.html';">
            <input type="email" class="form-control mb-2" placeholder="E-mail ou utilizador" required>
            <input type="password" class="form-control mb-3" placeholder="Palavra-passe" required>
            <button type="submit" class="btn btn-primary w-100 fw-bold mb-3">Entrar</button>
        </form>
        <p class="text-center small">Não tens conta? <a href="cadastro.html" class="fw-bold text-decoration-none">Registre-se</a></p>
    </div>
</body>
</html>
