<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Julia Beatriz</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container justify-content-between">
      <a class="navbar-brand logo-fonte fs-3 text-decoration-none" href="../index.html">CartoonGram</a>
      <div class="d-flex align-items-center gap-1">
        <a href="../index.html"       class="nav-icon-btn" title="Início">    <i class="bi bi-house-door"></i></a>
        <a href="perfil.html"         class="nav-icon-btn active" title="Perfil"><i class="bi bi-person-circle-fill"></i></a>
        <a href="configuracao.html"   class="nav-icon-btn" title="Configurações"><i class="bi bi-gear"></i></a>
      </div>
    </div>
  </nav>

  <main class="container py-3">
    <div class="row justify-content-center">
      <div class="col-12 col-md-7 col-lg-5">

        <!-- PROFILE HEADER -->
        <div class="profile-header fade-in">
          <img src="https://img.quizur.com/f/img6019625ad2d8a2.14565371.jpg"
               class="profile-img-large mb-3" alt="Julia Beatriz">
          <h4 class="fw-bold mb-0">Julia Beatriz</h4>
          <p class="text-muted small mb-3">Desenvolvedora | Técnica em Agro</p>

          <div class="profile-stats">
            <div class="stat-item">
              <span class="stat-number">12</span>
              <span class="stat-label">posts</span>
            </div>
            <div class="stat-item">
              <span class="stat-number">348</span>
              <span class="stat-label">seguidores</span>
            </div>
            <div class="stat-item">
              <span class="stat-number">219</span>
              <span class="stat-label">seguindo</span>
            </div>
          </div>

          <div class="d-flex gap-2 justify-content-center flex-wrap mb-2">
            <span class="badge-pink">Java</span>
            <span class="badge-pink">Desenvolvimento Web</span>
            <span class="badge-pink">AgroTech</span>
          </div>

          <div class="d-flex gap-2 justify-content-center mt-3">
            <button class="btn-pink px-4">Seguir</button>
            <button class="btn-pink-outline px-4">Mensagem</button>
            <a href="configuracao.html" class="btn-pink-outline px-3" title="Editar perfil">
              <i class="bi bi-pencil"></i>
            </a>
          </div>
        </div>

        <!-- TABS -->
        <ul class="nav nav-tabs border-0 mb-3 justify-content-center gap-2" id="profileTabs">
          <li class="nav-item">
            <button class="nav-link active px-4 rounded-pill border" style="font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;"
              data-bs-toggle="tab" data-bs-target="#tabFotos">
              <i class="bi bi-grid-3x3 me-1"></i>Posts
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link px-4 rounded-pill border" style="font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;"
              data-bs-toggle="tab" data-bs-target="#tabSalvos">
              <i class="bi bi-bookmark me-1"></i>Salvos
            </button>
          </li>
        </ul>

        <div class="tab-content">
          <!-- GRID DE FOTOS -->
          <div class="tab-pane fade show active" id="tabFotos">
            <div class="profile-grid">
              <div class="profile-grid-item"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgTxW7g3q1mpKNpV9pZ3Q013CjWKVWY1cxhw&s" alt="post"></div>
              <div class="profile-grid-item"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcScvSstS26Fi0ITTfHXLnCbUKXoaT5T8FS0Tg&s" alt="post"></div>
              <div class="profile-grid-item"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQkD-EiVaMzsaoC0c8NA4IVXAOmzIIG38yQ6Q&s" alt="post"></div>
              <div class="profile-grid-item"><img src="https://i.pravatar.cc/300?img=20" alt="post"></div>
              <div class="profile-grid-item"><img src="https://i.pravatar.cc/300?img=33" alt="post"></div>
              <div class="profile-grid-item"><img src="https://i.pravatar.cc/300?img=44" alt="post"></div>
            </div>
          </div>
          <!-- SALVOS -->
          <div class="tab-pane fade" id="tabSalvos">
            <div class="empty-state">
              <i class="bi bi-bookmark"></i>
              <p class="fw-semibold mb-1">Nenhum post salvo</p>
              <span class="small">Posts salvos aparecerão aqui.</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
